name: Deploy to Vercel (production)

# Auto-publishes main to Vercel production on every push.
# One-time setup: add these repo secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       (Vercel → Account Settings → Tokens)
#   VERCEL_ORG_ID      (from `vercel link` → .vercel/project.json, or Project Settings)
#   VERCEL_PROJECT_ID  (same place)
# Until those exist the job skips cleanly (stays green) — no failures.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish to Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect Vercel secrets
        id: chk
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then echo "ok=yes" >> "$GITHUB_OUTPUT"; else echo "ok=no" >> "$GITHUB_OUTPUT"; fi

      - name: Set up Node.js
        if: steps.chk.outputs.ok == 'yes'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: steps.chk.outputs.ok == 'yes'
        run: npm i -g vercel@latest

      - name: Deploy to production
        if: steps.chk.outputs.ok == 'yes'
        run: |
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel deploy --prod --yes --token "$VERCEL_TOKEN"

      - name: Not configured (skipped)
        if: steps.chk.outputs.ok != 'yes'
        run: echo "::notice::Auto-deploy skipped — add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID in repo Settings → Secrets and variables → Actions to enable it."
